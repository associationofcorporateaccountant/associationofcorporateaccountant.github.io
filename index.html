<!DOCTYPE html>
<html>
<head>
  <title>ITR Filing - Save More Tax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { margin:0; font-family:'Segoe UI'; background:#f5f7fa; }

    .section { padding:60px 20px; max-width:1000px; margin:auto; text-align:center; }
    h2 { color:#0B3C5D; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card {
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .card:hover { transform:translateY(-8px); }

    .icon {
      width:50px;
      margin-bottom:10px;
    }

    .counter {
      font-size:30px;
      font-weight:bold;
      color:#0B3C5D;
    }

    .testimonial {
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .name {
      margin-top:10px;
      font-weight:bold;
      color:#0B3C5D;
    }

    .price-card img {
      width:60px;
      margin-bottom:10px;
    }

    .price {
      font-size:22px;
      font-weight:bold;
      color:#0B3C5D;
    }

  </style>
</head>

<body>

<!-- SERVICES -->
<div class="section">
  <h2>💰 Services</h2>
  <div class="grid">
    <div class="card">
      <img class="icon" src="https://img.icons8.com/fluency/48/tax.png">
      ITR Filing
    </div>
    <div class="card">
      <img class="icon" src="https://img.icons8.com/fluency/48/calculator.png">
      Tax Planning
    </div>
    <div class="card">
      <img class="icon" src="https://img.icons8.com/fluency/48/money.png">
      Deduction Optimization
    </div>
  </div>
</div>

<!-- IMPACT -->
<div class="section">
  <h2>📊 Our Impact</h2>
  <div class="grid">
    <div class="card">
      <img class="icon" src="https://img.icons8.com/fluency/48/conference-call.png">
      <div class="counter" data-target="200">0</div>
      Clients Served
    </div>
    <div class="card">
      <img class="icon" src="https://img.icons8.com/fluency/48/rupee.png">
      <div class="counter" data-target="500000">0</div>
      Tax Saved
    </div>
    <div class="card">
      <img class="icon" src="https://img.icons8.com/fluency/48/checked.png">
      <div class="counter" data-target="99">0</div>
      % Accuracy
    </div>
  </div>
</div>

<!-- TESTIMONIAL -->
<div class="section">
  <h2>⭐ Testimonials</h2>
  <div class="testimonial" id="testimonial">
    "Very smooth and quick ITR filing experience."
    <div class="name">— Amit Sharma, Noida</div>
  </div>
</div>

<!-- PRICING -->
<div class="section">
  <h2>💼 Pricing</h2>
  <div class="grid">
    <div class="card price-card">
      <img src="https://img.icons8.com/fluency/48/document.png">
      Basic ITR Filing
      <div class="price">₹499</div>
    </div>
    <div class="card price-card">
      <img src="https://img.icons8.com/fluency/48/combo-chart.png">
      ITR + Tax Planning
      <div class="price">₹999</div>
    </div>
    <div class="card price-card">
      <img src="https://img.icons8.com/fluency/48/diamond.png">
      Premium Support
      <div class="price">₹1499</div>
    </div>
  </div>
</div>

<script>
  // COUNTER
  document.querySelectorAll('.counter').forEach(counter=>{
    const update=()=>{
      const target=+counter.getAttribute('data-target');
      const c=+counter.innerText;
      const inc=target/100;

      if(c<target){
        counter.innerText=Math.ceil(c+inc);
        setTimeout(update,20);
      } else {
        counter.innerText=target;
      }
    };
    update();
  });

  // TESTIMONIAL SLIDER
  const testimonials = [
    {text:"Very smooth and quick ITR filing experience.", name:"Amit Sharma, Noida"},
    {text:"Got maximum refund without hassle.", name:"Priya Verma, Lucknow"},
    {text:"Professional and reliable service.", name:"Rahul Singh, Delhi"},
    {text:"Explained everything clearly and saved tax.", name:"Neha Gupta, Kanpur"},
    {text:"Highly recommended for salaried employees.", name:"Vikas Mishra, Ghaziabad"}
  ];

  let i=0;
  setInterval(()=>{
    document.getElementById("testimonial").innerHTML =
      `"${testimonials[i].text}"<div class="name">— ${testimonials[i].name}</div>`;
    i=(i+1)%testimonials.length;
  },3000);
</script>

</body>
</html>
